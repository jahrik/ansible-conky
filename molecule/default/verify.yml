---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check conky binary
      ansible.builtin.stat:
        path: /usr/bin/conky
      register: conky_bin

    - name: Assert conky is installed
      ansible.builtin.assert:
        that: conky_bin.stat.exists
        fail_msg: "conky binary not found at /usr/bin/conky"

    - name: Check ~/.conkyrc
      ansible.builtin.stat:
        path: ~/.conkyrc
      register: conkyrc

    - name: Assert conkyrc exists
      ansible.builtin.assert:
        that: conkyrc.stat.exists
        fail_msg: "~/.conkyrc not found"
