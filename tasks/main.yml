---
- name: Install conky
  ansible.builtin.include_tasks:
    file: install.yml
    apply:
      tags:
        - conky
        - conky:install
  when: install | default(true) | bool
  tags:
    - conky
    - conky:install

- name: Uninstall conky
  ansible.builtin.include_tasks:
    file: uninstall.yml
    apply:
      tags:
        - conky
        - conky:uninstall
  when: not (install | default(true) | bool)
  tags:
    - conky
    - conky:uninstall
